<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F4ECDD" />
    <title>Page introuvable — Le P'tit Crousti</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Onest:wght@400;500&family=Spline+Sans+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --farine: #f4ecdd;
        --encre: #241710;
        --tomate: #a8332a;
        --croute: #c98a3e;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: var(--farine);
        color: var(--encre);
        font-family: 'Onest', system-ui, sans-serif;
        min-height: 100vh;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      main {
        max-width: 640px;
        text-align: center;
      }
      .code {
        font-family: 'Spline Sans Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--tomate);
        margin-bottom: 1.5rem;
      }
      h1 {
        font-family: 'Caprasimo', Georgia, serif;
        font-size: clamp(3rem, 10vw, 6rem);
        line-height: 0.95;
        letter-spacing: -0.02em;
      }
      h1 span { color: var(--tomate); }
      p {
        margin-top: 1.5rem;
        font-size: 1.1rem;
        opacity: 0.8;
      }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin-top: 2rem;
        padding: 1rem 1.5rem;
        border-radius: 999px;
        background: var(--tomate);
        color: var(--farine);
        text-decoration: none;
        font-family: 'Spline Sans Mono', monospace;
        font-size: 0.75rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        transition: background 0.2s;
      }
      .cta:hover { background: #87271f; }
      .phone {
        display: block;
        margin-top: 1.5rem;
        font-family: 'Caprasimo', Georgia, serif;
        font-size: 1.75rem;
        color: var(--tomate);
        text-decoration: none;
      }
      .filet {
        margin: 2rem auto 0;
        height: 1px;
        width: 80px;
        background: repeating-linear-gradient(90deg, var(--croute) 0 8px, transparent 8px 14px);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="code">✦ Erreur 404</p>
      <h1>Cette page a<br /><span>filé du four</span>.</h1>
      <p>La page que vous cherchez n'existe pas — ou plus. Pas grave, la pizza est toujours là.</p>
      <a class="cta" href="/">↩ Retour à l'accueil</a>
      <div class="filet"></div>
      <a class="phone" href="tel:+33381443216">03 81 44 32 16</a>
    </main>
  </body>
</html>
