        <h1 style="font-size:2rem;margin:0 0 .5rem">Le P'tit Crousti — Pizzeria artisanale</h1>
        <p style="font-style:italic">La pizza maison, façon tradition italienne, au cœur du Haut-Doubs.</p>
        <p><strong>3 Grande Rue, 25390 Orchamps-Vennes</strong> — Téléphone <a href="tel:+33381443216">03 81 44 32 16</a></p>
        <p>Service à emporter, du mardi au dimanche de 17h30 à 22h00. Fermé le lundi.</p>
        <p>Note Google : 4,5/5 (66 avis) — <a href="https://www.facebook.com/Leptitcrousti/">Page Facebook</a> (1000+ fans).</p>
        <h2>Notre carte</h2>
        <p>29 pizzas maison de 8,50 € à 13,50 €. Régionales du Haut-Doubs (Morteau, cancoillotte, morbier, Mont d'Or, reblochon), classiques (Marguerita, Jambon, 4 Saisons…), base crème (Carbonara, Flammenküche), fromagères (Chèvre miel, 4 Fromages).</p>
        <h2>Distributeurs 24 h / 24</h2>
        <p>Deux distributeurs automatiques en libre-service à Orchamps-Vennes et à Fuans. Choisissez, payez par carte, la pizza cuit en 3 minutes.</p>
